<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aura – Voorraad Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f7f7f5; color: #1a1a1a; min-height: 100vh; }
    header { background: #fff; border-bottom: 1px solid #e8e8e8; padding: 16px 32px; display: flex; align-items: center; gap: 12px; }
    .logo-wrap { display: flex; align-items: center; gap: 10px; }
    .brand-name { font-size: 22px; font-weight: 700; color: #4ECBA1; letter-spacing: -0.5px; }
    .header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
    .subtitle { font-size: 12px; color: #bbb; }
    .btn { font-size: 12px; border-radius: 6px; padding: 6px 12px; cursor: pointer; font-weight: 600; border: none; }
    .btn-sync { background: #4ECBA1; color: #fff; min-width: 110px; }
    .btn-sync:hover { background: #3ab88e; }
    .btn-sync:disabled { background: #aaa; cursor: wait; }
    .btn-refresh { background: none; color: #888; border: 1px solid #e0e0e0; }
    .btn-refresh:hover { background: #f5f5f5; }
    main { padding: 28px 32px; max-width: 1200px; margin: 0 auto; }
    .section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #bbb; margin-bottom: 14px; }
    .loading { display: flex; align-items: center; justify-content: center; height: 100px; color: #bbb; font-size: 14px; gap: 8px; }
    .spinner { width: 18px; height: 18px; border: 2px solid #eee; border-top-color: #4ECBA1; border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 36px; }
    .card { background: #fff; border: 1px solid #ebebeb; border-radius: 14px; padding: 20px 22px; display: flex; flex-direction: column; gap: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
    .card-header { display: flex; align-items: center; gap: 10px; }
    .color-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
    .color-dot.fg { background: #3A7D44; } .color-dot.aw { background: #F0F0EC; border: 1.5px solid #c0c0c0; } .color-dot.mb { background: #1C1C1E; } .color-dot.fi { background: #4ECBA1; }
    .card-label { font-size: 13px; font-weight: 600; color: #555; }
    .card-value { font-size: 42px; font-weight: 700; color: #1a1a1a; line-height: 1; }
    .card-bar-bg { height: 5px; background: #f2f2f2; border-radius: 99px; overflow: hidden; }
    .card-bar { height: 100%; border-radius: 99px; }
    .bar-fg { background: #3A7D44; } .bar-aw { background: #aaa; } .bar-mb { background: #1C1C1E; } .bar-fi { background: #4ECBA1; }
    .card-status { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 99px; display: inline-flex; align-items: center; gap: 4px; width: fit-content; }
    .status-ok { background: #E8F5E9; color: #2E7D32; } .status-low { background: #FFF3E0; color: #E65100; } .status-critical { background: #FFEBEE; color: #C62828; }
    .correctie-box { background: #fff; border: 1px solid #ebebeb; border-radius: 14px; padding: 22px 24px; margin-bottom: 36px; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
    .correctie-form { display: grid; grid-template-columns: 1fr 1fr 2fr 1fr auto; gap: 10px; align-items: end; margin-top: 14px; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group label { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
    .form-group select, .form-group input { border: 1px solid #e0e0e0; border-radius: 8px; padding: 8px 12px; font-size: 13px; color: #1a1a1a; background: #fff; outline: none; }
    .form-group select:focus, .form-group input:focus { border-color: #4ECBA1; }
    .btn-correctie { background: #1a1a1a; color: #fff; border: none; border-radius: 8px; padding: 9px 18px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .btn-correctie:hover { background: #333; }
    .correctie-feedback { font-size: 12px; margin-top: 10px; padding: 8px 12px; border-radius: 8px; display: none; }
    .correctie-feedback.ok { background: #E8F5E9; color: #2E7D32; display: block; }
    .correctie-feedback.err { background: #FFEBEE; color: #C62828; display: block; }
    .adj-type-aftrek { color: #C62828; } .adj-type-toevoeging { color: #2E7D32; }
    table { width: 100%; border-collapse: collapse; font-size: 13.5px; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
    thead th { text-align: left; padding: 10px 14px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: #bbb; border-bottom: 1.5px solid #ebebeb; }
    tbody tr { border-bottom: 1px solid #f5f5f5; } tbody tr:hover { background: #fafafa; }
    tbody td { padding: 11px 14px; vertical-align: middle; }
    .order-num { font-weight: 700; } .bundle-name { color: #333; } .timestamp { color: #bbb; font-size: 12px; white-space: nowrap; }
    .deductions { display: flex; gap: 6px; flex-wrap: wrap; }
    .ded-badge { display: inline-flex; align-items: center; gap: 5px; background: #f8f8f8; border: 1px solid #ebebeb; border-radius: 6px; padding: 3px 8px; font-size: 12px; font-weight: 600; color: #333; }
    .ded-dot { width: 9px; height: 9px; border-radius: 50%; }
    .ded-dot.fg { background: #3A7D44; } .ded-dot.aw { background: #E8E8E4; border: 1px solid #bbb; } .ded-dot.mb { background: #1C1C1E; } .ded-dot.fi { background: #4ECBA1; }
    .error-banner { background: #FFEBEE; color: #C62828; border-radius: 10px; padding: 14px 18px; font-size: 13px; margin-bottom: 24px; display: none; }
    .error-banner.visible { display: block; }
  </style>
</head>
<body>
<header>
  <div class="logo-wrap">
    <svg width="38" height="38" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M50 5 C50 5,78 35,78 58 C78 73.5,65.5 86,50 86 C34.5 86,22 73.5,22 58 C22 35,50 5,50 5Z" fill="#4ECBA1"/>
      <path d="M35 68 Q42 52,50 54 Q58 56,62 68 Q56 76,50 78 Q43 76,35 68Z" fill="white" fill-opacity="0.35"/>
    </svg>
    <span class="brand-name">aura</span>
  </div>
  <div class="header-right">
    <span class="subtitle">Bijgewerkt: <span id="lastUpdate">—</span></span>
    <button class="btn btn-refresh" onclick="fetchData()">&#8635; Ververs</button>
    <button class="btn btn-sync" id="syncBtn" onclick="runSync()">&#9654; Sync nu</button>
  </div>
</header>
<main>
  <div class="error-banner" id="errorBanner"></div>
  <div class="section-title">Huidige Voorraad</div>
  <div id="cardsWrap"><div class="loading"><div class="spinner"></div> Laden...</div></div>

  <div class="section-title" style="margin-top:32px">Handmatige Correctie</div>
  <div class="correctie-box">
    <div style="font-size:13px;color:#888;">Defecten, cadeaus, intern gebruik of andere correcties die niet via Shopify lopen.</div>
    <div class="correctie-form">
      <div class="form-group"><label>Type</label><select id="adjType"><option value="aftrek">- Aftrek</option><option value="toevoeging">+ Toevoeging</option></select></div>
      <div class="form-group"><label>Product</label><select id="adjProduct"><option value="fg">Forest Green</option><option value="aw">Arctic White</option><option value="mb">Midnight Black</option><option value="fi">Filters</option></select></div>
      <div class="form-group"><label>Reden</label><input type="text" id="adjReason" placeholder="bijv. defect, cadeau..." /></div>
      <div class="form-group"><label>Aantal</label><input type="number" id="adjAmount" min="1" value="1" /></div>
      <button class="btn-correctie" onclick="submitCorrectie()">Opslaan</button>
    </div>
    <div class="correctie-feedback" id="correctieFeedback"></div>
  </div>

  <div class="section-title">Correctie Log</div>
  <div id="adjWrap" style="margin-bottom:36px"><div class="loading"><div class="spinner"></div> Laden...</div></div>

  <div class="section-title">Recente Bestellingen</div>
  <div id="tableWrap"><div class="loading"><div class="spinner"></div> Laden...</div></div>
</main>
<script>
  const API='/api/data', SYNC_API='/api/sync', ADJ_API='/api/adjust', SECRET='aura2026dashboard';
  const cm={fg:{label:'Forest Green',cls:'fg',barCls:'bar-fg'},aw:{label:'Arctic White',cls:'aw',barCls:'bar-aw'},mb:{label:'Midnight Black',cls:'mb',barCls:'bar-mb'},fi:{label:'Filters',cls:'fi',barCls:'bar-fi'}};

  function renderCards(data){
    const maxQ=Math.max(...Object.values(data.inventory));
    let html='<div class="cards">';
    for(const [k,q] of Object.entries(data.inventory)){
      const m=cm[k],t=data.thresholds[k],p=Math.min(100,Math.round((q/(maxQ*1.1))*100)),r=q/t;
      let sc,st;
      if(r>=2){sc='status-ok';st='checkmark Op voorraad';}else if(r>=1){sc='status-low';st='! Laag';}else{sc='status-critical';st='x Kritiek';}
      html+=`<div class="card"><div class="card-header"><div class="color-dot ${m.cls}"></div><span class="card-label">${m.label}</span></div><div class="card-value">${q}</div><div class="card-bar-bg"><div class="card-bar ${m.barCls}" style="width:${p}%"></div></div><span class="card-status ${sc}">${st}</span></div>`;
    }
    html+='</div>';
    document.getElementById('cardsWrap').innerHTML=html;
  }

  function renderOrders(data){
    let html='<table><thead><tr><th>#Order</th><th>Bundle</th><th>Flessen & Filters</th><th>Datum & Tijd</th></tr></thead><tbody>';
    for(const o of data.orders){
      const ts=new Date(o.timestamp);
      const ds=ts.toLocaleDateString('nl-NL',{day:'2-digit',month:'short',year:'numeric'});
      const tm=(ts.getHours()===0&&ts.getMinutes()===0)?'':ts.toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'});
      let badges='';
      for(const [k,q] of Object.entries(o.deductions)){if(q>0){const m=cm[k];badges+=`<span class="ded-badge"><span class="ded-dot ${m.cls}"></span>${q}x ${m.label}</span>`;}}
      html+=`<tr><td class="order-num">#${o.orderNumber}</td><td class="bundle-name">${o.bundleName}</td><td class="deductions">${badges||'&mdash;'}</td><td class="timestamp">${ds}${tm?' &middot; '+tm:''}</td></tr>`;
    }
    html+='</tbody></table>';
    document.getElementById('tableWrap').innerHTML=html;
  }

  async function renderAdjustments(){
    try{
      const res=await fetch(ADJ_API+'?t='+Date.now());
      const adj=await res.json();
      if(!adj.length){document.getElementById('adjWrap').innerHTML='<p style="color:#bbb;font-size:13px;padding:8px 0">Nog geen handmatige correcties.</p>';return;}
      let html='<table><thead><tr><th>Type</th><th>Product</th><th>Aantal</th><th>Reden</th><th>Datum</th></tr></thead><tbody>';
      for(const a of adj){
        const m=cm[a.product];
        const ts=new Date(a.timestamp).toLocaleString('nl-NL',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
        const tl=a.type==='toevoeging'?'<span class="adj-type-toevoeging">+ Toevoeging</span>':'<span class="adj-type-aftrek">- Aftrek</span>';
        html+=`<tr><td>${tl}</td><td><span class="ded-badge"><span class="ded-dot ${m.cls}"></span>${m.label}</span></td><td>${a.amount}</td><td>${a.reason}</td><td class="timestamp">${ts}</td></tr>`;
      }
      html+='</tbody></table>';
      document.getElementById('adjWrap').innerHTML=html;
    }catch(e){document.getElementById('adjWrap').innerHTML='<p style="color:#bbb;font-size:13px">Kon correcties niet laden.</p>';}
  }

  async function runSync(){
    const btn=document.getElementById('syncBtn');
    btn.disabled=true; btn.textContent='Bezig...';
    try{
      const res=await fetch(SYNC_API,{headers:{'Authorization':'Bearer '+SECRET}});
      const data=await res.json();
      if(data.ok){
        btn.textContent='Gesynchroniseerd!';
        setTimeout(()=>{btn.textContent='Sync nu';btn.disabled=false;},3000);
        await fetchData();
      }else{btn.textContent='Fout';setTimeout(()=>{btn.textContent='Sync nu';btn.disabled=false;},3000);}
    }catch(e){btn.textContent='Fout';setTimeout(()=>{btn.textContent='Sync nu';btn.disabled=false;},3000);}
  }

  async function submitCorrectie(){
    const fb=document.getElementById('correctieFeedback');
    fb.className='correctie-feedback';
    const product=document.getElementById('adjProduct').value;
    const amount=parseInt(document.getElementById('adjAmount').value);
    const reason=document.getElementById('adjReason').value.trim();
    const type=document.getElementById('adjType').value;
    if(!reason){fb.textContent='Vul een reden in.';fb.className='correctie-feedback err';return;}
    if(!amount||amount<1){fb.textContent='Vul een geldig aantal in.';fb.className='correctie-feedback err';return;}
    try{
      const res=await fetch(ADJ_API,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+SECRET},body:JSON.stringify({product,amount,reason,type})});
      const data=await res.json();
      if(data.ok){fb.textContent='Correctie opgeslagen!';fb.className='correctie-feedback ok';document.getElementById('adjReason').value='';document.getElementById('adjAmount').value='1';fetchData();renderAdjustments();}
      else{fb.textContent='Fout: '+(data.error||'onbekend');fb.className='correctie-feedback err';}
    }catch(e){fb.textContent='Netwerkfout: '+e.message;fb.className='correctie-feedback err';}
  }

  async function fetchData(){
    const err=document.getElementById('errorBanner');err.classList.remove('visible');
    try{
      const res=await fetch(API+'?t='+Date.now());
      if(!res.ok)throw new Error('HTTP '+res.status);
      const data=await res.json();
      renderCards(data);renderOrders(data);
      document.getElementById('lastUpdate').textContent=new Date(data.lastUpdate).toLocaleString('nl-NL',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
    }catch(e){err.textContent='Kon data niet laden: '+e.message;err.classList.add('visible');}
  }

  fetchData();renderAdjustments();
</script>
</body>
</html>
